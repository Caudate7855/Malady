name: Build project

on:
  push:
    tags:
      - '*'

jobs:
  buildForAllSupportedPlatforms:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64 # Build a Windows 64-bit standalone.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}
          restore-keys: Library-

      - name: Ensure free disk space (for Android)
        if: matrix.targetPlatform == 'Android'
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: Build with Unity
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: WindowsBuild
          path: build/StandaloneWindows64

      - name: Send artifact to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ARTIFACT_PATH="build/StandaloneWindows64/WindowsBuild"  # Путь к артефакту
          echo "Sending artifact from path: $ARTIFACT_PATH"
          curl -F chat_id=$TELEGRAM_CHAT_ID \
               -F document=@"$ARTIFACT_PATH" \
               -F caption="New build for ${{ matrix.targetPlatform }}" \
               https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument
