name: Build project

on:
  push:
    tags:        
      - '*'  

jobs:
  buildForAllSupportedPlatforms:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64 # Build a Windows 64-bit standalone.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}
          restore-keys: Library-
      - if: matrix.targetPlatform == 'Android'
        uses: jlumbroso/free-disk-space@v1.3.1
      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
      - uses: actions/upload-artifact@v3
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}
      - name: Upload to Yandex Disk
        env:
          YANDEX_DISK_TOKEN: ${{ secrets.YANDEX_DISK_TOKEN }}
        run: |
          FILE="build/${{ matrix.targetPlatform }}/your_build_file.zip"
          UPLOAD_URL="https://cloud-api.yandex.net/v1/disk/resources/upload?path=disk:/path/to/your_build_file.zip&overwrite=true"
          curl -X GET -H "Authorization: OAuth $YANDEX_DISK_TOKEN" "$UPLOAD_URL" | \
          jq -r '.href' | \
          xargs -I{} curl -T $FILE -H "Authorization: OAuth $YANDEX_DISK_TOKEN" {}
